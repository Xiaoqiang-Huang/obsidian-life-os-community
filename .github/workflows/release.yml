name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify and build plugin
        run: npm test

      - name: Validate release version
        shell: bash
        run: |
          manifest_version="$(node -p "require('./manifest.json').version")"
          if [ "$manifest_version" != "$GITHUB_REF_NAME" ]; then
            echo "manifest.json version $manifest_version does not match tag $GITHUB_REF_NAME"
            exit 1
          fi

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="$GITHUB_REF_NAME"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" main.js manifest.json styles.css --clobber
          else
            gh release create "$tag" main.js manifest.json styles.css \
              --title "Life OS $tag" \
              --notes "Community review build for Life OS $tag."
          fi
